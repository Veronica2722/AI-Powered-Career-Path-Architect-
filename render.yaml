services:
  - type: web
    name: career-architect-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r backend/requirements.txt
      python backend/career_architect/manage.py collectstatic --noinput
      python backend/career_architect/manage.py migrate --noinput
    startCommand: |
      cd backend
      gunicorn career_architect.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: career_architect_db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://career-architect.vercel.app,http://localhost:3000"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: AWS_STORAGE_BUCKET_NAME
        value: career-architect-media
      - key: AWS_S3_REGION_NAME
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: career-architect-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: |
      cd frontend
      npm ci --include=dev
      npm run build
    staticPublishPath: ./frontend/.next
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://career-architect-backend.onrender.com/api
      - key: NEXT_PUBLIC_APP_NAME
        value: Career Path Architect
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: career_architect_db
    region: oregon
    plan: free
    databaseName: career_architect
    user: career_architect_user

