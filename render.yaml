# Environment-specific settings
environments:
  - name: production
    envVars:
      - key: DEBUG
        value: "False"
      - key: SENTRY_DSN
        sync: false
      - key: GOOGLE_ANALYTICS_ID
        value: UA-XXXXXXXXX-X

  - name: staging
    envVars:
      - key: DEBUG
        value: "True"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://staging-career-architect.vercel.app,http://localhost:3000"

