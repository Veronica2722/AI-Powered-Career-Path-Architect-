# Environment variables documentation
envVarsDoc: |
  # Required variables:
  # SECRET_KEY: Django secret key for cryptography
  # DATABASE_URL: PostgreSQL connection string
  # GEMINI_API_KEY: Google Gemini API key for AI features
  
  # Optional variables:
  # DEBUG: Set to "True" for debugging, "False" in production
  # ALLOWED_HOSTS: Comma-separated list of allowed hosts
  # CORS_ALLOWED_ORIGINS: Comma-separated list of allowed CORS origins
  # JWT_SECRET_KEY: Secret key for JWT token generation
  # AWS_*: AWS credentials for S3 file storage (optional)
  # SENTRY_DSN: Sentry DSN for error tracking (optional)
  # GOOGLE_ANALYTICS_ID: Google Analytics tracking ID (optional)

# Deployment regions
regions:
  - oregon
  - frankfurt
  - singapore
  - sydney

# Build settings
buildSettings:
  nodeVersion: 18.x
  pythonVersion: 3.11.0

# Disk settings
disk:
  name: data
  mountPath: /data
  sizeGB: 1

# Network settings
network:
  - type: private
    name: internal
    services:
      - career-architect-backend
      - career-architect-frontend

# Service dependencies
dependencies:
  - name: career-architect-frontend
    dependsOn:
      - career-architect-backend

# Auto-scaling (for paid plans)
# autoScaling:
#   minInstances: 1
#   maxInstances: 3
#   targetMemoryPercent: 70
#   targetCPUPercent: 70

# Secrets management
secrets:
  - name: gemini_api_key
    description: Google Gemini API key
    required: true
  
  - name: aws_access_key_id
    description: AWS access key for S3 storage
    required: false
  
  - name: aws_secret_access_key
    description: AWS secret key for S3 storage
    required: false
  
  - name: sentry_dsn
    description: Sentry DSN for error tracking
    required: false

# Health check endpoints
healthCheckPaths:
  - path: /health/
    expectedResponseCode: 200
  
  - path: /api/
    expectedResponseCode: 200
  
  - path: /admin/
    expectedResponseCode: 302  # Redirect to login

# Maintenance mode
maintenanceMode:
  enabled: false
  message: "We're performing maintenance. We'll be back shortly!"

# Backup settings (for database)
backupSettings:
  schedule: "0 0 * * *"  # Daily at midnight
  retentionDays: 30
  region: oregon

# Log settings
logSettings:
  retentionDays: 30
  level: info

# Metrics
metrics:
  enabled: true
  dashboard: true
  alerts: true