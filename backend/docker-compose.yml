version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: career_architect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/career_architect
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
    depends_on:
      - db

volumes:
  postgres_data: